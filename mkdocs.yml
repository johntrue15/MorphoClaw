site_name: AutoResearchClaw
site_description: Autonomous MorphoSource research agent with a live knowledge graph, iterative segmentation, and integrity verification.
site_url: https://johntrue15.github.io/MorphoClaw/
repo_url: https://github.com/johntrue15/MorphoClaw
repo_name: johntrue15/MorphoClaw
edit_uri: edit/main/docs/
copyright: Copyright &copy; AutoResearchClaw contributors. MIT licensed.

docs_dir: docs
site_dir: site
exclude_docs: |
  archive/**
  scripts/**
  overrides/**
  main.py
  QUICK_START.md

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  logo: assets/img/logo.svg
  favicon: assets/img/favicon.svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johntrue15/MorphoClaw
    - icon: fontawesome/solid/database
      link: https://www.morphosource.org/
      name: MorphoSource
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated

extra_css:
  - assets/css/extra.css
  - assets/css/knowledge-graph.css

extra_javascript:
  - assets/js/knowledge-graph.js

plugins:
  - search:
      lang: en
  - macros:
      module_name: main
      on_undefined: keep
      on_error_fail: false
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      enable_git_follow: false
      strict: false
  - mermaid2:
      version: 10.9.1

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Submit a Query: query.md
  - Knowledge Graph: knowledge-graph.md
  - Research Pipeline:
      - Architecture: architecture.md
      - Iterative Segmentation: ITERATIVE_SEGMENTATION.md
      - Issue Automation: ISSUE_AUTOMATION.md
      - Integrity Verifier: INTEGRITY_VERIFIER.md
      - Query System: QUERY_SYSTEM_GUIDE.md
      - Submission Guide: QUERY_SUBMISSION_GUIDE.md
      - Multi-Response Grading: MULTI_RESPONSE_GRADING.md
  - Reference:
      - CLI: reference/cli.md
      - Workflows: reference/workflows.md
      - Secrets & Env: reference/secrets.md
      - Project Structure: reference/project-structure.md
      - Deployment Notes: DEPLOYMENT_NOTES.md
  - Contributing: contributing.md
  - Changelog: changelog.md

watch:
  - docs
  - mkdocs.yml
