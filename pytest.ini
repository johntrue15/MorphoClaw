[pytest]
# Pytest configuration for Metadata-to-Morphsource-compare

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Markers
markers =
    numpy: tests that require a healthy numpy/SciPy install
        (skip locally with `pytest -m "not numpy"` if your env is broken)

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */env/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
