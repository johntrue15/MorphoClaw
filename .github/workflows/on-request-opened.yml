name: "Comparison Request Handler"

# Fires whenever a new issue is opened. Only acts on issues created from the
# `comparison_request.yml` template (which carries the `request-type:comparison`
# and `request-creator:user` labels). Dispatches the labeler, the initial
# comments, and the admin notification workflows in parallel.

on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read

jobs:
  call-request-labeler:
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:comparison') &&
          contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-labeler.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-initial-comments:
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:comparison') &&
          contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-initial-comments.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-notify-admin:
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:comparison') &&
          contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-notify-admin.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit
