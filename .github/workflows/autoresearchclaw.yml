name: AutoResearchClaw Agent

concurrency:
  group: autoresearch-${{ github.run_id }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      research_topic:
        description: 'Research topic or goal to investigate'
        required: true
        type: string
      research_depth:
        description: 'Internal research cycles on Mac mini (default: 10)'
        required: false
        type: number
        default: 10
      github_issues:
        description: 'Number of GitHub issues to create for user review (default: 3)'
        required: false
        type: number
        default: 3
      media_id:
        description: 'MorphoSource media ID to seed the research (e.g. 000038412)'
        required: false
        type: string
        default: ''
      media_list_id:
        description: 'MorphoSource media list ID for batch seeding (e.g. 000656244)'
        required: false
        type: string
        default: ''
      continue_from:
        description: 'GitHub issue number to continue from (e.g. 223). Loads prior discoveries and memory.'
        required: false
        type: string
        default: ''
      openai_model:
        description: 'OpenAI model to use (default: gpt-5.4)'
        required: false
        type: string
        default: 'gpt-5.4'
      enable_nninteractive:
        description: 'Enable iterative nnInteractive segmentation (LLM paint loop)'
        required: false
        type: boolean
        default: false
      nninteractive_goal:
        description: 'Segmentation goal for nnInteractive, e.g. "Segment the cranial cavity"'
        required: false
        type: string
        default: ''
      nninteractive_max_steps:
        description: 'Max LLM iterations for the nnInteractive paint loop'
        required: false
        type: number
        default: 12
      run_integrity_verifier:
        description: 'Run the Plato''s-Cave integrity verifier after the run completes'
        required: false
        type: boolean
        default: true

jobs:
  create-research-issue:
    name: Create Research Tracking Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}

    steps:
      - name: Create research discussion issue
        id: create-issue
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            async function retry(fn, label, maxAttempts = 3) {
              for (let i = 1; i <= maxAttempts; i++) {
                try { return await fn(); }
                catch (err) {
                  const retryable = err.status >= 500 || err.message?.includes('fetch failed');
                  console.log(`[${label}] attempt ${i}/${maxAttempts} failed: ${err.message} (status=${err.status})`);
                  if (!retryable || i === maxAttempts) throw err;
                  const delay = Math.min(5000 * Math.pow(2, i - 1), 30000);
                  console.log(`  retrying in ${delay}ms...`);
                  await new Promise(r => setTimeout(r, delay));
                }
              }
            }

            const topic = `${{ inputs.research_topic }}`;
            const depth = ${{ inputs.research_depth || 10 }};
            const issues = ${{ inputs.github_issues || 3 }};
            const mediaId = `${{ inputs.media_id }}`.trim();
            const model = `${{ inputs.openai_model }}` || 'gpt-5.4';

            const seedLine = mediaId
              ? `**Seed Media ID:** [\`${mediaId}\`](https://www.morphosource.org/concern/media/${mediaId})`
              : '**Seed Media ID:** _none (topic-only)_';

            const body = [
              '### AutoResearchClaw Research Program',
              '',
              '**Research Topic:**',
              topic,
              '',
              `**Research Depth:** ${depth} internal cycles`,
              `**GitHub Issues:** ${issues} reports`,
              seedLine,
              `**Model:** \`${model}\``,
              '',
              '---',
              '',
              'Status: Running...',
              '',
              `The agent will run ${depth} autonomous research cycles on the Mac mini, `,
              `posting ${issues} GitHub issue(s) at regular intervals with findings. `,
              'Logs are available on the Mac mini dashboard at http://localhost:5001',
              '',
              'The agent will autonomously:',
              '1. Decompose the topic into MorphoSource queries',
              '2. Search for relevant specimen data',
              '3. Evaluate findings and decide what to explore next',
              `4. Repeat ${depth} times, building memory across cycles`,
              `5. Surface findings in ${issues} GitHub issue(s)`,
              '',
              '---',
              '',
              '_Post a follow-up comment to continue the research after all cycles complete._',
            ].join('\n');

            const issue = await retry(() => github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Research [${depth}x/${issues} issues]: ${topic}`,
              body: body,
              labels: ['research-agent', 'research-program'],
            }), 'create-issue');

            core.setOutput('issue_number', issue.data.number.toString());
            console.log(`Created tracking issue #${issue.data.number}`);

  research-pipeline:
    name: Run Iterative Research Pipeline
    runs-on: self-hosted
    needs: create-research-issue
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Note: actions/cache was removed. This job only runs on the self-hosted
      # Mac mini where ~/.autoresearchclaw/specimens already persists between
      # runs on local disk. The cache was creating a unique key per run_id and
      # then trying to tar/upload the entire 35+ GB directory in the post-step,
      # which exhausted free space on the runner ("No space left on device")
      # and exceeded GitHub Actions' 10 GB per-repo cache limit anyway.

      - name: Set up Python
        run: |
          export PATH="/opt/anaconda3/bin:$PATH"
          python3 --version
          python3 -m pip install --quiet openai requests python-dotenv flask

      - name: Ensure nnInteractive is bootstrapped (idempotent)
        if: ${{ inputs.enable_nninteractive }}
        run: |
          NNI_HOME="${NNINTERACTIVE_HOME:-$HOME/.autoresearchclaw/nninteractive}"
          if [ -x "$NNI_HOME/bin/python" ] && \
             "$NNI_HOME/bin/python" -c "import nnInteractive" >/dev/null 2>&1; then
            echo "nnInteractive venv already present at $NNI_HOME — skipping bootstrap"
          else
            echo "Bootstrapping nnInteractive at $NNI_HOME (first run, may take ~10 min)"
            chmod +x .github/scripts/install_nninteractive.sh
            .github/scripts/install_nninteractive.sh
          fi

      - name: Run research agent
        id: research
        env:
          PATH: /opt/anaconda3/bin:/usr/local/bin:/usr/bin:/bin
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai_model || 'gpt-5.4' }}
          MORPHOSOURCE_API_KEY: ${{ secrets.MORPHOSOURCE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.create-research-issue.outputs.issue_number }}
          DEBUG: 'false'
          ENABLE_NNINTERACTIVE: ${{ inputs.enable_nninteractive && '1' || '0' }}
          NNINTERACTIVE_GOAL: ${{ inputs.nninteractive_goal }}
          NNINTERACTIVE_MAX_STEPS: ${{ inputs.nninteractive_max_steps || 12 }}
        working-directory: .github/scripts
        run: |
          MEDIA_ARG=""
          if [ -n "${{ inputs.media_id }}" ]; then
            MEDIA_ARG="--media-id ${{ inputs.media_id }}"
          fi
          LIST_ARG=""
          if [ -n "${{ inputs.media_list_id }}" ]; then
            LIST_ARG="--media-list ${{ inputs.media_list_id }}"
          fi
          CONTINUE_ARG=""
          if [ -n "${{ inputs.continue_from }}" ]; then
            CONTINUE_ARG="--continue-from ${{ inputs.continue_from }}"
          fi
          python3 research_agent.py \
            "${{ inputs.research_topic }}" \
            --research-depth ${{ inputs.research_depth || 10 }} \
            --github-issues ${{ inputs.github_issues || 3 }} \
            $MEDIA_ARG $LIST_ARG $CONTINUE_ARG \
            > research_agent.log 2>&1
          EXIT_CODE=$?
          echo "Agent exited with code $EXIT_CODE"
          echo "Log size: $(wc -l < research_agent.log) lines"
          tail -20 research_agent.log
          exit $EXIT_CODE

      - name: Upload research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-report
          path: |
            .github/scripts/research_report.json
            .github/scripts/research_report.md
            .github/scripts/research_agent.log
          if-no-files-found: warn

      - name: Upload knowledge graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-graph
          path: |
            ~/.autoresearchclaw/graphs/*.json
            ~/.autoresearchclaw/graphs/*.html
          if-no-files-found: ignore

      - name: Publish knowledge graph snapshot to docs/
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RESEARCH_TOPIC: ${{ inputs.research_topic }}
        run: |
          set -e
          # Skip silently if the agent didn't produce any graph JSON
          # (e.g. it crashed before knowledge_graph.export_json fired).
          if ! ls ~/.autoresearchclaw/graphs/*.json >/dev/null 2>&1; then
            echo "No knowledge graph JSON in ~/.autoresearchclaw/graphs/; skipping publish."
            exit 0
          fi
          python3 docs/scripts/merge_graphs.py \
            --in  "$HOME/.autoresearchclaw/graphs" \
            --out docs/data \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --topic "$RESEARCH_TOPIC" \
            --verbose

      - name: Commit refreshed knowledge graph snapshot
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): refresh knowledge graph snapshot (run ${{ github.run_id }})"
          file_pattern: docs/data/**
          commit_user_name: autoresearchclaw-bot
          commit_user_email: autoresearchclaw-bot@users.noreply.github.com
          commit_author: autoresearchclaw-bot <autoresearchclaw-bot@users.noreply.github.com>
          skip_dirty_check: false
          skip_fetch: false

      - name: Upload nnInteractive segmentations
        if: ${{ always() && inputs.enable_nninteractive }}
        uses: actions/upload-artifact@v4
        with:
          name: nninteractive-segmentations
          path: |
            ~/.autoresearchclaw/specimens/*/nninteractive/*.nii.gz
            ~/.autoresearchclaw/specimens/*/nninteractive/*.json
            ~/.autoresearchclaw/specimens/*/nninteractive/*.png
            ~/.autoresearchclaw/specimens/*/nninteractive/*.md
          if-no-files-found: ignore

      - name: Log specimen cache status
        if: always()
        run: |
          echo "Cached specimens:"
          ls ~/.autoresearchclaw/specimens/ 2>/dev/null | head -20 || echo "  (none)"
          du -sh ~/.autoresearchclaw/specimens/ 2>/dev/null || echo "  0B"

      - name: Post final status to tracking issue
        if: always()
        env:
          ISSUE_NUMBER: ${{ needs.create-research-issue.outputs.issue_number }}
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            async function retry(fn, label, maxAttempts = 4) {
              for (let i = 1; i <= maxAttempts; i++) {
                try { return await fn(); }
                catch (err) {
                  const retryable = err.status >= 500 || err.message?.includes('fetch failed');
                  console.log(`[${label}] attempt ${i}/${maxAttempts} failed: ${err.message} (status=${err.status})`);
                  if (!retryable || i === maxAttempts) throw err;
                  const delay = Math.min(5000 * Math.pow(2, i - 1), 60000);
                  console.log(`  retrying in ${delay}ms...`);
                  await new Promise(r => setTimeout(r, delay));
                }
              }
            }

            const issueNumber = parseInt(process.env.ISSUE_NUMBER || '0');
            if (!issueNumber) return;

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const status = '${{ job.status }}';

            const comment = [
              `### Research Program ${status === 'success' ? 'Complete' : 'Finished'}`,
              '',
              `**Workflow status:** ${status}`,
              `**[View workflow run](${runUrl})**`,
              '',
              status === 'success'
                ? '_All cycles completed. Post a comment to continue the research._'
                : '_Some cycles may have failed. Check the workflow run for details._',
            ].join('\n');

            await retry(() => github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment,
            }), 'post-comment');

            const labels = status === 'success'
              ? ['research-agent', 'research-program', 'completed']
              : ['research-agent', 'research-program', 'needs-review'];

            await retry(() => github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: labels,
            }), 'set-labels');

  trigger-integrity-verifier:
    name: Trigger Plato's-Cave Integrity Verifier
    runs-on: ubuntu-latest
    needs: [create-research-issue, research-pipeline]
    if: always() && inputs.run_integrity_verifier && needs.create-research-issue.outputs.issue_number != ''
    permissions:
      issues: write
      contents: read
      actions: write

    steps:
      - name: Dispatch verify_research_run workflow
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = '${{ needs.create-research-issue.outputs.issue_number }}';
            try {
              // Try to dispatch the dedicated verifier workflow first.
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: 'verify_research_run.yml',
                ref:   context.ref || 'main',
                inputs: {
                  issue_number: issueNumber,
                  use_llm: 'true',
                  dry_run: 'false',
                },
              });
              console.log(`Dispatched verify_research_run.yml for issue #${issueNumber}`);
            } catch (err) {
              // Fall back to posting "/verify" so the issue_comment trigger
              // picks it up.  This works even if the workflow_dispatch path
              // is not yet enabled on a fresh fork.
              console.log(`workflow_dispatch failed (${err.message}); falling back to /verify comment`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: parseInt(issueNumber, 10),
                body: '/verify',
              });
            }
