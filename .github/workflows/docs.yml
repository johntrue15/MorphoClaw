name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs and plugins
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
          echo "--- versions ---"
          python --version
          mkdocs --version
          pip list | grep -iE "mkdocs|pymdown|jinja|macros|mermaid"

      - name: Build site
        run: mkdocs build --verbose --clean

      - name: Show build output
        if: always()
        run: |
          echo "--- site root ---"
          ls -la site/ || echo "no site/ directory"
          echo "--- key files ---"
          for f in site/index.html site/knowledge-graph/index.html site/data/knowledge_graph.json; do
            if [ -f "$f" ]; then
              echo "OK  $f ($(wc -c < "$f") bytes)"
            else
              echo "MISS $f"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
